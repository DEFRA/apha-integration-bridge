<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>APHA Integration Bridge API</title>
  </head>
  <body>
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.44.23"></script>
    <script>
      const COGNITO_TOKEN_URL = '{{tokenUrl}}'

      Scalar.createApiReference('#app', {
        url: '/.well-known/openapi/v1/openapi.json',
        authentication: {
          preferredSecurityScheme: 'oauth2',
          securitySchemes: {
            oauth2: {
              flows: {
                clientCredentials: {
                  tokenUrl: COGNITO_TOKEN_URL,
                  'x-scalar-credentials-location': 'body'
                }
              }
            }
          }
        }
      })
    </script>
  </body>
</html>
