include:
  # run opentelemetry services locally to develop and test traces and metrics
  - path: './.docker-compose/opentelemetry.compose.yml'
    service: opentelemetry
  # run the oracledb service locally with mock data
  - path: './.docker-compose/oracledb.compose.yml'
    service: oracledb

services:
  redis:
    image: redis:7.2.3-alpine3.18
    command: --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis-data:/data
  mongodb:
    image: mongo:6.0.13
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data
    restart: always

volumes:
  redis-data:
    name: redis-data
  mongodb-data:
    name: mongodb-data
