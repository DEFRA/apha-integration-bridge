name: Publish Hot Fix

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: '094954420758'

jobs:
  build:
    name: CDP-build-hotfix-workflow
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # Depth 0 is required for branch-based versioning

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Login to oracle container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: container-registry.oracle.com
          username: ${{ secrets.ORACLE_USERNAME }}
          password: ${{ secrets.ORACLE_SECRET_KEY }}

      - name: Install Oracle Instant Client
        id: oracle
        run: ./.github/scripts/oracle-instant-client.sh

      - name: Start only oracledb compose service
        run: npm run compose:up -- --no-deps -d oracledb

      - run: npm ci

      - run: npm test
        env:
          ORACLE_CLIENT_LIB_DIR: ${{ steps.oracle.outputs.install-path }}

      - name: Publish Hot Fix
        uses: DEFRA/cdp-build-action/build-hotfix@550c4792fac07cfd59eaea469bc0a17ce202cced # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
